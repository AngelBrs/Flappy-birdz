<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flapzy Bird 🐦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --sky:#87CEEB;--ground:#8B7355;--coin:#FFD700;--gem:#FF69B4;
    --ui-bg:rgba(0,0,0,0.82);--panel:#1a1a2e;--accent:#FFD700;
    --green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;
  }
  body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Nunito',sans-serif;overflow:hidden;touch-action:none}
  #gameWrapper{position:relative;width:390px;height:720px;overflow:hidden;border-radius:24px;box-shadow:0 0 60px rgba(0,0,0,0.8)}
  canvas{display:block;width:100%;height:100%}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.3s;pointer-events:none;opacity:0}
  .screen.active{opacity:1;pointer-events:all}
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
  #scoreDisplay{font-family:'Fredoka One',cursive;font-size:52px;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,0.4),0 0 20px rgba(255,255,255,0.3);line-height:1}
  #livesDisplay{display:flex;gap:4px}
  .heart{font-size:22px;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4))}
  #coinHud{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.4);border-radius:20px;padding:4px 10px}
  #coinHud span{font-size:14px;font-weight:800;color:#FFD700}
  #powerupBar{position:absolute;top:85px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:10;pointer-events:none}
  .powerup-icon{width:36px;height:36px;border-radius:10px;border:2px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(0,0,0,0.5);position:relative;overflow:hidden}
  .powerup-icon .timer-fill{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,0.3);transition:height 0.1s linear}

  /* HOME SCREEN */
  #homeScreen{background:linear-gradient(180deg,#1a1a3e 0%,#0f3460 50%,#16213e 100%)}
  .game-title{font-family:'Fredoka One',cursive;font-size:58px;color:#FFD700;text-shadow:0 4px 0 #b8860b,0 0 30px rgba(255,215,0,0.5);text-align:center;line-height:1;margin-bottom:4px}
  .game-subtitle{font-size:14px;color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
  .bird-logo{font-size:80px;animation:float 2s ease-in-out infinite;margin-bottom:10px}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
  .btn{padding:14px 40px;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:22px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;min-width:200px}
  .btn:active{transform:scale(0.95)}
  .btn-play{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#1a1a1a;box-shadow:0 6px 0 #b8600a,0 8px 20px rgba(255,140,0,0.4)}
  .btn-play:active{box-shadow:0 2px 0 #b8600a,0 4px 10px rgba(255,140,0,0.3);transform:translateY(4px)}
  .btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2);font-size:16px;padding:10px 28px}
  .home-stats{display:flex;gap:24px;margin:20px 0}
  .stat-box{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:10px 20px;text-align:center}
  .stat-box .val{font-family:'Fredoka One',cursive;font-size:26px;color:#FFD700}
  .stat-box .lbl{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
  .home-buttons{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
  .icon-row{display:flex;gap:12px;margin-top:10px}
  .icon-btn{width:54px;height:54px;border-radius:16px;border:none;font-size:22px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
  .icon-btn:active{transform:scale(0.9)}
  .daily-badge{position:absolute;top:-4px;right:-4px;background:#f87171;color:#fff;font-size:9px;font-weight:900;padding:2px 5px;border-radius:10px;text-transform:uppercase}

  /* GAME OVER */
  #gameOverScreen{background:rgba(0,0,0,0.75);backdrop-filter:blur(8px)}
  .go-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid rgba(255,255,255,0.1);border-radius:24px;padding:20px;width:300px;text-align:center}
  .go-title{font-family:'Fredoka One',cursive;font-size:34px;color:#f87171;text-shadow:0 3px 0 #7f1d1d;margin-bottom:2px}
  .go-score{font-family:'Fredoka One',cursive;font-size:58px;color:#fff;line-height:1}
  .go-best{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:10px}
  .go-rewards{display:flex;justify-content:center;gap:16px;margin:10px 0;padding:10px;background:rgba(255,255,255,0.05);border-radius:14px}
  .reward-item{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;color:#FFD700}
  .go-buttons{display:flex;gap:10px;justify-content:center;margin-top:12px}
  .btn-retry{background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;box-shadow:0 5px 0 #15803d}
  .btn-retry:active{transform:translateY(4px);box-shadow:0 1px 0 #15803d}

  /* SHOP */
  #shopScreen{background:linear-gradient(180deg,#0f0f23 0%,#1a1a3e 100%);padding:0}
  .shop-header{padding:20px 20px 10px;display:flex;align-items:center;gap:12px;background:rgba(0,0,0,0.3)}
  .shop-header h2{font-family:'Fredoka One',cursive;font-size:28px;color:#FFD700;flex:1}
  .currency-badge{display:flex;align-items:center;gap:6px;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:6px 14px}
  .currency-badge span{font-weight:800;font-size:16px;color:#FFD700}
  .shop-tabs{display:flex;padding:0 20px;gap:8px;overflow-x:auto;scrollbar-width:none}
  .shop-tabs::-webkit-scrollbar{display:none}
  .tab-btn{padding:8px 18px;border-radius:20px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
  .tab-btn.active{background:#FFD700;color:#1a1a1a}
  .tab-btn:not(.active){background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
  .shop-grid{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow-y:auto;max-height:440px;scrollbar-width:none}
  .shop-grid::-webkit-scrollbar{display:none}
  .shop-item{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08);border-radius:18px;padding:14px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
  .shop-item.owned{border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.05)}
  .shop-item.equipped{border-color:#FFD700;background:rgba(255,215,0,0.08);box-shadow:0 0 15px rgba(255,215,0,0.2)}
  .shop-item.locked{opacity:0.5}
  .item-icon{font-size:44px;margin-bottom:6px;display:block}
  .item-name{font-weight:800;font-size:13px;color:#fff;margin-bottom:3px}
  .item-desc{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:8px;min-height:28px}
  .item-price{display:flex;align-items:center;justify-content:center;gap:4px;font-weight:800;font-size:14px}
  .item-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px;text-transform:uppercase}
  .badge-equipped{background:#FFD700;color:#1a1a1a}
  .badge-owned{background:#4ade80;color:#1a1a1a}
  .badge-new{background:#f472b6;color:#fff}

  /* UPGRADES */
  .upgrade-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:440px;scrollbar-width:none}
  .upgrade-list::-webkit-scrollbar{display:none}
  .upgrade-item{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:all 0.2s}
  .upgrade-item:active{transform:scale(0.98)}
  .upgrade-icon-wrap{font-size:32px;min-width:48px;text-align:center}
  .upgrade-info{flex:1}
  .upgrade-name{font-weight:800;font-size:14px;color:#fff}
  .upgrade-desc{font-size:11px;color:rgba(255,255,255,0.5);margin:2px 0}
  .upgrade-level{display:flex;gap:4px;margin-top:4px}
  .lvl-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15)}
  .lvl-dot.filled{background:#FFD700}
  .upgrade-cost{text-align:right;min-width:70px}
  .upgrade-cost .cost-val{font-weight:800;font-size:14px;color:#FFD700;display:block}
  .upgrade-cost .max-lbl{font-size:11px;color:#4ade80;font-weight:800}

  /* DAILY REWARD */
  #dailyScreen{background:rgba(0,0,0,0.85);backdrop-filter:blur(10px)}
  .daily-card{background:linear-gradient(135deg,#1a1a2e,#0f3460);border:2px solid rgba(255,215,0,0.3);border-radius:24px;padding:30px;width:320px;text-align:center}
  .daily-title{font-family:'Fredoka One',cursive;font-size:28px;color:#FFD700;margin-bottom:6px}
  .daily-subtitle{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px}
  .daily-reward-big{font-size:72px;animation:pulse 1s ease-in-out infinite;margin-bottom:10px}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .daily-amount{font-family:'Fredoka One',cursive;font-size:36px;color:#FFD700;margin-bottom:20px}
  .streak-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
  .streak-day{width:38px;height:38px;border-radius:10px;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:18px}
  .streak-day.claimed{background:rgba(74,222,128,0.2);border-color:#4ade80}
  .streak-day.today{background:rgba(255,215,0,0.2);border-color:#FFD700;animation:glow 1.5s infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 5px rgba(255,215,0,0.3)}50%{box-shadow:0 0 20px rgba(255,215,0,0.7)}}

  /* NOTIFICATIONS */
  #notifContainer{position:absolute;top:120px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center}
  .notif{background:rgba(0,0,0,0.8);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;animation:notifAnim 1.5s forwards;white-space:nowrap}
  @keyframes notifAnim{0%{opacity:0;transform:translateY(0)}20%{opacity:1}80%{opacity:1;transform:translateY(-20px)}100%{opacity:0;transform:translateY(-30px)}}

  /* BACK BTN */
  .back-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* Stars bg */
  .stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}

  /* Combo text */
  #comboDisplay{position:absolute;right:16px;top:50%;transform:translateY(-50%);text-align:right;pointer-events:none;z-index:10;transition:opacity 0.3s}
  .combo-text{font-family:'Fredoka One',cursive;font-size:28px;color:#FFD700;text-shadow:0 2px 0 #b8860b;animation:comboAnim 0.3s ease-out}
  @keyframes comboAnim{0%{transform:scale(1.4)}100%{transform:scale(1)}}

  @media(max-height:720px){#gameWrapper{width:100vw;height:100vh;border-radius:0}}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="390" height="720"></canvas>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <div id="scoreDisplay">0</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div id="livesDisplay"></div>
      <div id="coinHud">🪙 <span id="coinHudVal">0</span></div>
    </div>
  </div>
  <div id="powerupBar"></div>
  <div id="comboDisplay"></div>
  <div id="notifContainer"></div>

  <!-- HOME SCREEN -->
  <div id="homeScreen" class="screen active">
    <div class="stars" id="starsEl"></div>
    <div class="bird-logo" id="homeBirdIcon">🐤</div>
    <div class="game-title">FLAPZY</div>
    <div class="game-subtitle">⭐ A Wild Bird Adventure ⭐</div>
    <div class="home-stats">
      <div class="stat-box"><div class="val" id="homeBest">0</div><div class="lbl">Best</div></div>
      <div class="stat-box"><div class="val" id="homeCoins">0</div><div class="lbl">🪙 Coins</div></div>
      <div class="stat-box"><div class="val" id="homeGems">0</div><div class="lbl">💎 Gems</div></div>
    </div>
    <div class="home-buttons">
      <button class="btn btn-play" id="playBtn">▶ PLAY</button>
      <div class="icon-row">
        <button class="icon-btn" id="shopBtn" style="background:rgba(255,215,0,0.15);border:2px solid rgba(255,215,0,0.3);color:#FFD700;font-size:22px" title="Shop">🏪</button>
        <button class="icon-btn" id="upgradeBtn" style="background:rgba(96,165,250,0.15);border:2px solid rgba(96,165,250,0.3);color:#60a5fa;font-size:22px" title="Upgrades">⚡</button>
        <button class="icon-btn" id="dailyBtn" style="background:rgba(74,222,128,0.15);border:2px solid rgba(74,222,128,0.3);color:#4ade80;font-size:22px;position:relative" title="Daily Reward">
          🎁<span class="daily-badge" id="dailyBadge" style="display:none">NEW</span>
        </button>
        <button class="icon-btn" id="soundBtn" style="background:rgba(192,132,252,0.15);border:2px solid rgba(192,132,252,0.3);color:#c084fc;font-size:22px" title="Sound">🔊</button>
      </div>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" class="screen">
    <div class="go-card">
      <div class="go-title" id="goTitle">GAME OVER</div>
      <div class="go-score" id="goScore">0</div>
      <div class="go-best" id="goBest">Best: 0</div>
      <div class="go-rewards">
        <div class="reward-item">🪙 <span id="goCoins">+0</span></div>
        <div class="reward-item">💎 <span id="goGems">+0</span></div>
        <div class="reward-item" id="goComboEl" style="display:none">🔥 x<span id="goCombo">0</span></div>
      </div>
      <div class="go-buttons" style="flex-direction:column;gap:8px;width:100%">
        <div style="display:flex;gap:8px;width:100%">
          <button class="btn btn-retry" id="retryBtn" style="flex:1;font-size:18px;padding:12px">↺ Retry</button>
          <button class="btn btn-secondary" id="goShopBtn" style="padding:12px 16px;font-size:18px;min-width:unset">🏪</button>
        </div>
        <button class="btn btn-secondary" id="goHomeBtn" style="width:100%;font-size:16px;padding:11px">🏠 Return to Menu</button>
      </div>
    </div>
  </div>

  <!-- SHOP SCREEN -->
  <div id="shopScreen" class="screen">
    <div class="shop-header">
      <button class="back-btn" id="shopBackBtn">←</button>
      <h2>🏪 Shop</h2>
      <div class="currency-badge">🪙 <span id="shopCoinsVal">0</span></div>
      <div class="currency-badge" style="border-color:rgba(255,105,180,0.3);background:rgba(255,105,180,0.1)">💎 <span id="shopGemsVal">0</span></div>
    </div>
    <div class="shop-tabs">
      <button class="tab-btn active" data-tab="birds">🐦 Birds</button>
      <button class="tab-btn" data-tab="trails">✨ Trails</button>
      <button class="tab-btn" data-tab="powerups">⚡ Powers</button>
      <button class="tab-btn" data-tab="themes">🌍 Themes</button>
    </div>
    <div class="shop-grid" id="shopGrid"></div>
  </div>

  <!-- UPGRADES SCREEN -->
  <div id="upgradesScreen" class="screen" style="background:linear-gradient(180deg,#0f0f23,#1a1a3e);padding:0">
    <div class="shop-header">
      <button class="back-btn" id="upgradesBackBtn">←</button>
      <h2>⚡ Upgrades</h2>
      <div class="currency-badge">🪙 <span id="upgradeCoinsVal">0</span></div>
    </div>
    <div class="upgrade-list" id="upgradeList"></div>
  </div>

  <!-- DAILY REWARD SCREEN -->
  <div id="dailyScreen" class="screen">
    <div class="daily-card">
      <div class="daily-title">🎁 Daily Reward</div>
      <div class="daily-subtitle">Come back every day for bigger rewards!</div>
      <div class="daily-reward-big" id="dailyRewardIcon">🪙</div>
      <div class="daily-amount" id="dailyRewardAmt">+100 Coins</div>
      <div class="streak-row" id="streakRow"></div>
      <button class="btn btn-play" id="claimBtn" style="width:100%">🎁 CLAIM!</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// SAVE DATA
// ============================================================
const SAVE_KEY = 'flapzy_v3';
function loadSave(){
  try{ return JSON.parse(localStorage.getItem(SAVE_KEY))||{} }catch(e){ return {} }
}
function save(){
  try{ localStorage.setItem(SAVE_KEY,JSON.stringify(G.save)) }catch(e){}
}
const defaultSave={
  coins:100, gems:5, best:0, totalGames:0,
  equippedBird:'classic', equippedTrail:'none', equippedTheme:'day',
  owned:['classic','none','day'],
  upgrades:{speed:0,gap:0,coins:0,shield:0,magnet:0, doubleCoins:0},
  lastDaily:0, streak:0, soundOn:true,
  equippedPower:'none', ownedPowers:['none']
};
const G = {
  save: Object.assign({}, defaultSave, loadSave()),
  score:0, coins:0, gems:0, lives:3, combo:0, comboTimer:0,
  activePowerups:{}, gameState:'home',
  particles:[], coins3d:[], pipes:[], powerupItems:[],
  bird:{x:90,y:300,vy:0,vx:0,angle:0,flaps:0},
  bg:{x:0}, ground:{x:0},
  frame:0, pipeTimer:0, coinTimer:0, powerTimer:0,
  shake:{x:0,y:0,t:0}, lastScore:-1,
  trails:[], loopId:null, startInvincible:60
};

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type){
  if(!G.save.soundOn) return;
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const t=ctx.currentTime;
    switch(type){
      case'flap': o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(300,t+0.08);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);break;
      case'score': o.type='triangle';o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1100,t+0.05);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);break;
      case'coin': o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(1600,t+0.1);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);break;
      case'die': o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(80,t+0.4);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);break;
      case'shield': o.type='sine';o.frequency.setValueAtTime(1400,t);o.frequency.setValueAtTime(900,t+0.1);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);break;
      case'powerup': o.type='triangle';[0,0.08,0.16].forEach((d,i)=>{o.frequency.setValueAtTime(600+i*200,t+d)});g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);break;
      case'combo': o.type='sine';o.frequency.setValueAtTime(800+G.combo*60,t);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);break;
      case'buy': o.type='triangle';o.frequency.setValueAtTime(880,t);o.frequency.setValueAtTime(1100,t+0.08);o.frequency.setValueAtTime(1320,t+0.16);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);break;
    }
    o.start(t); o.stop(t+0.6);
  }catch(e){}
}

// ============================================================
// SHOP DATA
// ============================================================
const BIRDS = [

// ============================================================
// PARTICLE SYSTEM
// ============================================================
function spawnParticles(x,y,count,colors,speed=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=speed*(0.5+Math.random());
    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,maxLife:0.6+Math.random()*0.4,r:3+Math.random()*4,color:colors[Math.floor(Math.random()*colors.length)]});
  }
}
function spawnTrail(x,y){
  const trail=G.save.equippedTrail;
  if(trail==='none') return;
  const configs={
    stars:{colors:['#FFD700','#fff','#FFF0A0'],size:4,count:1},
    fire:{colors:['#FF4500','#FF6A00','#FF8C00','#FFD700'],size:5,count:2},
    rainbow:{colors:['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#8B00FF'],size:4,count:1},
    hearts:{colors:['#FF69B4','#FF1493','#FF80AB'],size:5,count:1},
    lightning:{colors:['#FFFF00','#FFD700','#FFF'],size:4,count:2},
    diamonds:{colors:['#60a5fa','#c084fc','#f472b6'],size:5,count:1},
  };
  const c=configs[trail];
  if(!c) return;
  for(let i=0;i<c.count;i++){
    G.trails.push({x,y,life:1,r:c.size,color:c.colors[Math.floor(Math.random()*c.colors.length)],vx:-(1+Math.random()),vy:(Math.random()-0.5)*1.5});
  }
}

// ============================================================
// GAME LOGIC HELPERS
// ============================================================
function getUpgLevel(id){ return G.save.upgrades[id]||0; }
function getGapSize(){
  const base=160, bonus=[0,20,35,50];
  return base+(bonus[getUpgLevel('gap')]||0);
}
function getPipeSpeed(){
  const base=2.8, slow=[0,0.3,0.5,0.7];
  return base-(slow[getUpgLevel('speed')]||0)+(G.score*0.008);
}
function getLives(){
  const bonus=[0,1,2,3];
  return 3+(bonus[getUpgLevel('shield')]||0);
}
function getMagnetRadius(){
  const base=G.save.upgrades.coins>0?80:0;
  const bonus=[0,0,60,150];
  const powerBonus=G.activePowerups.magnet?150:0;
  return base+bonus[getUpgLevel('magnet')]+powerBonus;
}
function getCoinValue(){
  const mult=[1,1.5,2,3][getUpgLevel('doubleCoins')]||1;
  const powerMult=G.activePowerups.double?2:1;
  return Math.floor(mult*powerMult);
}

function spawnPipe(){
  const theme=THEMES_DATA[G.save.equippedTheme]||THEMES_DATA.day;
  const gap=getGapSize();
  const minY=120, maxY=H-GROUND_H-gap-120;
  const topH=minY+Math.random()*(maxY-minY);
  G.pipes.push({x:W+30,topH,gap,color:theme.pipe,rim:theme.pipeRim});
}
function spawnCoin(){
  const y=100+Math.random()*(H-GROUND_H-200);
  G.coins3d.push({x:W+20,y,size:14,collected:false,wobble:Math.random()*Math.PI*2,vy:0});
}
function spawnPowerItem(){
  const powers=['shield_drop','magnet_drop','slow_drop','double_drop','gem_drop'];
  const type=powers[Math.floor(Math.random()*powers.length)];
  const icons={shield_drop:'🛡️',magnet_drop:'🧲',slow_drop:'⏰',double_drop:'×2',gem_drop:'💎'};
  G.powerupItems.push({x:W+20,y:100+Math.random()*(H-GROUND_H-200),type,icon:icons[type],collected:false});
}

function startGame(){
  // Cancel any existing loop to prevent stacking
  if(G.loopId) { cancelAnimationFrame(G.loopId); G.loopId=null; }
  G.score=0; G.coins=0; G.gems=0; G.lives=getLives();
  G.combo=0; G.comboTimer=0; G.frame=0; G.pipeTimer=0;
  G.coinTimer=0; G.powerTimer=0; G.lastScore=-1;
  G.startInvincible=90; // ~1.5s grace period at start
  G.pipes=[]; G.coins3d=[]; G.particles=[]; G.trails=[];
  G.powerupItems=[];G.activePowerups={};
  G.bird={x:90,y:260,vy:-3,angle:0}; // start higher with slight upward velocity
  G.bg={x:0}; G.ground={x:0};
  G.gameState='playing';
  G.save.totalGames++;

  // Apply starting equipped power
  const ep=G.save.equippedPower;
  if(ep==='shield') G.activePowerups.shield={t:1,active:true};
  if(ep==='magnet') G.activePowerups.magnet={t:30};
  if(ep==='double') G.activePowerups.double={t:20};

  document.getElementById('hud').style.display='flex';
  updateHUD();
  hideAllScreens();
  G.loopId = requestAnimationFrame(gameLoop);
}

function flap(){
  if(G.gameState!=='playing') return;
  G.bird.vy=-7.2;
  spawnParticles(G.bird.x,G.bird.y,4,['#fff','#FFD700'],2);
  playSound('flap');
  G.bird.flaps=(G.bird.flaps||0)+1;
}

function die(){
  if(G.activePowerups.shield){
    delete G.activePowerups.shield;
    spawnParticles(G.bird.x,G.bird.y,12,['#60a5fa','#fff','#c084fc'],4);
    playSound('shield');
    screenShake(4);
    showNotif('🛡️ Shield saved you!');
    return;
  }
  if(G.save.equippedBird==='phoenix'&&!G._phoenixUsed){
    G._phoenixUsed=true;
    G.bird.vy=-6;
    spawnParticles(G.bird.x,G.bird.y,15,['#FF4500','#FFD700','#FF6A00'],5);
    showNotif('🔥 Phoenix reborn!');
    return;
  }
  G.lives--;
  screenShake(8);
  playSound('die');
  spawnParticles(G.bird.x,G.bird.y,20,['#f87171','#fff','#FFD700'],5);
  if(G.lives>0){
    G.bird.vy=-5;
    updateHUD();
    showNotif('💥 -1 Life');
    return;
  }
  G.gameState='dead';
  endGame();
}

function screenShake(intensity){
  G.shake.t=15; G.shake.intensity=intensity;
}

function endGame(){
  document.getElementById('hud').style.display='none';
  const bonus=G.save.equippedBird==='blue'?1.05:G.save.equippedBird==='eagle'?1.1:1;
  const finalScore=Math.floor(G.score*bonus);
  const isNew=finalScore>G.save.best;
  if(isNew) G.save.best=finalScore;
  // Gem reward every 10 pipes
  const gemsEarned=Math.floor(G.score/10);
  G.save.coins+=G.coins; G.save.gems+=(G.gems+gemsEarned);
  save();
  document.getElementById('goTitle').textContent=isNew?'🏆 NEW BEST!':'GAME OVER';
  document.getElementById('goScore').textContent=finalScore;
  document.getElementById('goBest').textContent='Best: '+G.save.best;
  document.getElementById('goCoins').textContent='+'+G.coins;
  document.getElementById('goGems').textContent='+'+gemsEarned;
  if(G.combo>2){ document.getElementById('goComboEl').style.display='flex'; document.getElementById('goCombo').textContent=G.combo;}
  else document.getElementById('goComboEl').style.display='none';
  showScreen('gameOverScreen');
}

  document.getElementById('scoreDisplay').textContent=G.score;
  document.getElementById('coinHudVal').textContent=G.coins;

  for(let i=0;i<G.lives;i++) lv.innerHTML+='<span class="heart">❤️</span>';

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(){
  if(G.gameState!=='playing'&&G.gameState!=='dead') return;
  G.frame++;
  if(G.startInvincible>0) G.startInvincible--;
  const theme=THEMES_DATA[G.save.equippedTheme]||THEMES_DATA.day;

  // Shake
  if(G.shake.t>0){
    G.shake.x=(Math.random()-0.5)*G.shake.intensity;
    G.shake.y=(Math.random()-0.5)*G.shake.intensity;
    G.shake.t--;
  } else { G.shake.x=0; G.shake.y=0; }

  ctx.save();
  ctx.translate(G.shake.x,G.shake.y);

  // Background
  const grad=ctx.createLinearGradient(0,0,0,H-GROUND_H);
  theme.sky.forEach((c,i)=>grad.addColorStop(i/(theme.sky.length-1),c));
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Space stars
  if(G.save.equippedTheme==='space'||G.save.equippedTheme==='night'){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    for(let i=0;i<80;i++){
      const sx=((i*137+G.frame*0.2)%W), sy=((i*91)%(H-GROUND_H));
      const br=0.5+0.5*Math.sin(G.frame*0.05+i);
      ctx.globalAlpha=br*0.7;
      ctx.fillRect(sx,sy,1.5,1.5);
    }
    ctx.globalAlpha=1;
  }

  // Background clouds
  if(G.save.equippedTheme!=='space'){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<4;i++){
      const cx=((i*180+W-(G.frame*0.4)%(W+200))%( W+200))-100;
      const cy=60+i*40;
      drawCloud(cx,cy,40+i*10);
    }
  }

  const speed=getPipeSpeed();

  // Pipes
  G.pipeTimer++;
  if(G.pipeTimer>=(90-Math.min(G.score*1.5,40))){ G.pipeTimer=0; spawnPipe(); }
  G.pipes.forEach(p=>{
    if(G.gameState==='playing') p.x-=speed;
    drawPipe(p,theme);
    // Score
    if(p.x+PIPE_W<G.bird.x&&!p.scored){
      p.scored=true; G.score++;
      G.combo++; G.comboTimer=120;
      playSound('score');
      if(G.combo>=3) playSound('combo');
      spawnParticles(G.bird.x+30,G.bird.y,5,['#FFD700','#fff'],3);
      updateHUD();
      if(G.score%5===0) showNotif('🎯 Score '+G.score+'!');
    }
    // Collision - skip during grace period
    if(G.gameState==='playing' && G.startInvincible<=0){
      const bx=G.bird.x, by=G.bird.y, br=BIRD_SIZE*0.38;
      const pw=PIPE_W-8;
      if(bx+br>p.x+4 && bx-br<p.x+pw){
        if(by-br<p.topH || by+br>p.topH+p.gap){
          // Ghost powerup?
          if(G.activePowerups.ghost&&!p.ghostUsed){
            p.ghostUsed=true;
            delete G.activePowerups.ghost;
            spawnParticles(bx,by,10,['#aaa','#fff'],3);
            showNotif('👻 Ghost used!');
          } else {
            die();
          }
        }
      }
    }
  });
  G.pipes=G.pipes.filter(p=>p.x>-100);

  // Coins
  G.coinTimer++;
  if(G.coinTimer>=45){ G.coinTimer=0; spawnCoin(); }
  const magR=getMagnetRadius();
  G.coins3d.forEach(coin=>{
    if(coin.collected) return;
    if(G.gameState==='playing') coin.x-=speed;
    coin.wobble+=0.08;
    // Magnet
    if(magR>0){
      const dx=G.bird.x-coin.x, dy=G.bird.y-coin.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<magR){ coin.x+=dx*0.12; coin.y+=dy*0.12; }
    }
    // Collect
    const dx=G.bird.x-coin.x, dy=G.bird.y-coin.y;
    if(Math.sqrt(dx*dx+dy*dy)<BIRD_SIZE*0.7){
      coin.collected=true;
      const val=getCoinValue();
      G.coins+=val;
      playSound('coin');
      spawnParticles(coin.x,coin.y,5,['#FFD700','#FFA500'],2);
      showNotif(val>1?`🪙 x${val} COINS!`:'🪙');
      updateHUD();
    }
    if(!coin.collected) drawCoin(coin);
  });
  G.coins3d=G.coins3d.filter(c=>c.x>-30&&!c.collected);

  // Power-up items
  G.powerTimer++;
  if(G.powerTimer>=300){ G.powerTimer=0; spawnPowerItem(); }
  G.powerupItems.forEach(pi=>{
    if(pi.collected) return;
    if(G.gameState==='playing') pi.x-=speed;
    const dx=G.bird.x-pi.x, dy=G.bird.y-pi.y;
    if(Math.sqrt(dx*dx+dy*dy)<BIRD_SIZE){
      pi.collected=true;
      playSound('powerup');
      applyDropPowerup(pi.type);
    }
    if(!pi.collected) drawPowerItem(pi);
  });
  G.powerupItems=G.powerupItems.filter(p=>p.x>-30&&!p.collected);

  // Combo timer
  if(G.comboTimer>0) G.comboTimer--;
  else G.combo=0;
  updateComboDisplay();

  // Active powerup timers
  Object.keys(G.activePowerups).forEach(k=>{
    const p=G.activePowerups[k];
    if(p.t!==undefined){ p.t-=1/60; if(p.t<=0) delete G.activePowerups[k]; }
  });
  renderPowerupBar();

  // Bird physics
  if(G.gameState==='playing'){
    G.bird.vy += 0.32; // reduced gravity (was 0.45)
    if(G.bird.vy > 11) G.bird.vy = 11; // cap fall speed
    if(G.activePowerups.slowmo) G.bird.vy = G.bird.vy * 0.7;
    G.bird.y += G.bird.vy;
    G.bird.angle = Math.max(-30, Math.min(80, G.bird.vy * 4));
    if(G.bird.y < BIRD_SIZE/2){ G.bird.y = BIRD_SIZE/2; G.bird.vy = 0; }
    if(G.bird.y > H-GROUND_H-BIRD_SIZE/2 && G.startInvincible<=0){ die(); G.bird.y = H-GROUND_H-BIRD_SIZE/2; }
  }

  // Trails
  spawnTrail(G.bird.x-10,G.bird.y);
  G.trails.forEach(t=>{ t.x+=t.vx; t.y+=t.vy; t.life-=0.06; });
  G.trails=G.trails.filter(t=>t.life>0);
  G.trails.forEach(t=>{ ctx.globalAlpha=t.life*0.8; ctx.fillStyle=t.color; ctx.beginPath(); ctx.arc(t.x,t.y,t.r*t.life,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;

  // Particles
  G.particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04; ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
  G.particles=G.particles.filter(p=>p.life>0);

  // Ground
  drawGround(theme);
  if(G.gameState==='playing') G.ground.x=(G.ground.x-speed*1.5)%(W/4);

  // Bird
  drawBird();

  ctx.restore();

  // Slow-mo trigger
  if(G.score===10&&G.save.equippedPower==='slowmo'&&!G.activePowerups.slowmo){
    G.activePowerups.slowmo={t:8};
    showNotif('⏰ Slow-Mo!');
    playSound('powerup');
  }

  if(G.gameState==='playing') G.loopId = requestAnimationFrame(gameLoop);
  else if(G.gameState==='dead') G.loopId = requestAnimationFrame(gameLoop);
}

function applyDropPowerup(type){
  switch(type){
    case'shield_drop': G.activePowerups.shield={active:true}; showNotif('🛡️ Shield activated!'); break;
    case'magnet_drop': G.activePowerups.magnet={t:15}; showNotif('🧲 Magnet!'); break;
    case'slow_drop': G.activePowerups.slowmo={t:8}; showNotif('⏰ Slow-Mo!'); break;
    case'double_drop': G.activePowerups.double={t:15}; showNotif('×2 Double Coins!'); break;
    case'gem_drop': G.gems++; G.save.gems++; save(); showNotif('💎 Gem found!'); updateHUD(); break;
    case'ghost': G.activePowerups.ghost={active:true}; showNotif('👻 Ghost mode!'); break;
  }
}

// ============================================================
// DRAW FUNCTIONS
// ============================================================
function drawCloud(x,y,r){
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.arc(x+r*0.8,y-r*0.3,r*0.7,0,Math.PI*2);
  ctx.arc(x+r*1.6,y,r*0.8,0,Math.PI*2);
  ctx.fill();
}

function drawPipe(p,theme){
  const gap=p.gap, r=10;
  // Top pipe
  ctx.fillStyle=p.color;
  roundRect(p.x,0,PIPE_W,p.topH-16,{bl:r,br:r});
  ctx.fillStyle=p.rim;
  roundRect(p.x-5,p.topH-20,PIPE_W+10,20,{bl:r,br:r,tl:r,tr:r});
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(p.x+8,4,10,p.topH-24);
  // Bottom pipe
  ctx.fillStyle=p.color;
  roundRect(p.x,p.topH+gap+16,PIPE_W,H,{tl:r,tr:r});
  ctx.fillStyle=p.rim;
  roundRect(p.x-5,p.topH+gap,PIPE_W+10,20,{tl:r,tr:r,bl:r,br:r});
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(p.x+8,p.topH+gap+24,10,H);
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.fillRect(p.x+PIPE_W-16,4,10,p.topH-24);
}

function roundRect(x,y,w,h,r={}){
  ctx.beginPath();
  ctx.moveTo(x+(r.tl||0),y);
  ctx.lineTo(x+w-(r.tr||0),y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+(r.tr||0));
  ctx.lineTo(x+w,y+h-(r.br||0));
  ctx.quadraticCurveTo(x+w,y+h,x+w-(r.br||0),y+h);
  ctx.lineTo(x+(r.bl||0),y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-(r.bl||0));
  ctx.lineTo(x,y+(r.tl||0));
  ctx.quadraticCurveTo(x,y,x+(r.tl||0),y);
  ctx.closePath();
  ctx.fill();
}

function drawGround(theme){
  ctx.fillStyle=theme.ground;
  ctx.fillRect(0,H-GROUND_H,W,GROUND_H);
  ctx.fillStyle=theme.groundTop;
  ctx.fillRect(0,H-GROUND_H,W,12);
  // Ground stripes
  ctx.fillStyle='rgba(0,0,0,0.08)';
  for(let i=0;i<8;i++){
    const sx=((i*60+G.ground.x)%W);
    ctx.fillRect(sx,H-GROUND_H,30,12);
  }
}

function drawCoin(coin){
  ctx.save();
  ctx.translate(coin.x,coin.y);
  const scaleX=Math.abs(Math.cos(coin.wobble));
  ctx.scale(scaleX,1);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0,8,10,4,0,0,Math.PI*2);
  ctx.fill();
  // Coin body
  const cg=ctx.createRadialGradient(-3,-3,1,0,0,coin.size);
  cg.addColorStop(0,'#FFE566');
  cg.addColorStop(0.6,'#FFD700');
  cg.addColorStop(1,'#B8860B');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.arc(0,0,coin.size,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(-3,-3,coin.size*0.4,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawPowerItem(pi){
  ctx.save();
  ctx.translate(pi.x,pi.y);
  ctx.scale(1+0.1*Math.sin(G.frame*0.1),1+0.1*Math.sin(G.frame*0.1));
  // Glow
  ctx.shadowColor='rgba(255,215,0,0.6)';
  ctx.shadowBlur=15;
  // Background
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(0,0,18,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.font='20px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(pi.icon,0,1);
  ctx.restore();
}

function drawBird(){
  const b=G.bird;
  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.rotate(b.angle*Math.PI/180);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(4,BIRD_SIZE*0.45,BIRD_SIZE*0.35,5,0,0,Math.PI*2);
  ctx.fill();
  // Shield glow
  if(G.activePowerups.shield){
    ctx.strokeStyle='rgba(96,165,250,0.8)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,BIRD_SIZE*0.6,0,Math.PI*2);
    ctx.stroke();
    ctx.fillStyle='rgba(96,165,250,0.1)';
    ctx.fill();
  }
  // Ghost effect
  if(G.activePowerups.ghost) ctx.globalAlpha=0.5;
  // Bird emoji
  const birdIcons={classic:'🐤',blue:'🐦',owl:'🦉',duck:'🦆',penguin:'🐧',eagle:'🦅',dragon:'🐲',phoenix:'🦕'};
  const icon=birdIcons[G.save.equippedBird]||'🐤';
  ctx.font=BIRD_SIZE+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(icon,0,0);
  ctx.globalAlpha=1;
  ctx.restore();
}

function updateComboDisplay(){
  const el=document.getElementById('comboDisplay');
  if(G.combo>=3){
    el.innerHTML=`<div class="combo-text" key="${G.combo}">🔥 x${G.combo}</div>`;
    el.style.opacity=1;
  } else {
    el.style.opacity=0;
  }
}

function renderPowerupBar(){
  const bar=document.getElementById('powerupBar');
  const icons={shield:'🛡️',magnet:'🧲',slowmo:'⏰',double:'×2',ghost:'👻'};
  let html='';
  Object.keys(G.activePowerups).forEach(k=>{
    const p=G.activePowerups[k];
    const pct=p.t!==undefined?Math.min(1,p.t/30):1;
    html+=`<div class="powerup-icon">${icons[k]||'⚡'}<div class="timer-fill" style="height:${pct*100}%"></div></div>`;
  });
  bar.innerHTML=html;
}

// ============================================================
// SHOP / UPGRADES UI
// ============================================================
function renderShop(tab='birds'){
  const grid=document.getElementById('shopGrid');
  let items=[];
  if(tab==='birds') items=BIRDS;
  else if(tab==='trails') items=TRAILS;
  else if(tab==='powerups') items=POWERS;
  else if(tab==='themes') items=THEMES;
  const equippedKey=tab==='birds'?'equippedBird':tab==='trails'?'equippedTrail':tab==='themes'?'equippedTheme':'equippedPower';
  grid.innerHTML=items.map(item=>{
    const owned=G.save.owned.includes(item.id);
    const equipped=G.save[equippedKey]===item.id;
    const priceDisplay=item.price===0?'Free':(item.currency==='gems'?`💎 ${item.price}`:`🪙 ${item.price}`);
    const badge=equipped?'<span class="item-badge badge-equipped">Equipped</span>':owned?'<span class="item-badge badge-owned">Owned</span>':'';
    return `<div class="shop-item${owned?' owned':''}${equipped?' equipped':''}" data-id="${item.id}" data-tab="${tab}">
      ${badge}
      <span class="item-icon">${item.icon}</span>
      <div class="item-name">${item.name}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-price" style="color:${item.currency==='gems'?'#FF69B4':'#FFD700'}">
        ${owned?'<span style="color:#4ade80">✓ Owned</span>':priceDisplay}
      </div>
    </div>`;
  }).join('');
  document.getElementById('shopCoinsVal').textContent=G.save.coins;
  document.getElementById('shopGemsVal').textContent=G.save.gems;
  grid.querySelectorAll('.shop-item').forEach(el=>{
    el.addEventListener('click',()=>handleShopClick(el.dataset.id,tab));
  });
}

function handleShopClick(id,tab){
  const items={birds:BIRDS,trails:TRAILS,powerups:POWERS,themes:THEMES};
  const item=items[tab].find(x=>x.id===id);
  if(!item) return;
  const equippedKey=tab==='birds'?'equippedBird':tab==='trails'?'equippedTrail':tab==='themes'?'equippedTheme':'equippedPower';
  if(G.save.owned.includes(id)){
    G.save[equippedKey]=id;
    save(); renderShop(tab); showNotif('✅ Equipped!'); playSound('buy');
    return;
  }
  const cost=item.price, cur=item.currency;
  if(cur==='coins'&&G.save.coins>=cost){
    G.save.coins-=cost; G.save.owned.push(id); G.save[equippedKey]=id;
    save(); renderShop(tab); showNotif('🎉 Purchased!'); playSound('buy');
  } else if(cur==='gems'&&G.save.gems>=cost){
    G.save.gems-=cost; G.save.owned.push(id); G.save[equippedKey]=id;
    save(); renderShop(tab); showNotif('🎉 Purchased!'); playSound('buy');
  } else {
    showNotif('❌ Not enough '+(cur==='gems'?'💎 gems':'🪙 coins')+'!');
  }
  updateHomeStats();
}

function renderUpgrades(){
  const list=document.getElementById('upgradeList');
  document.getElementById('upgradeCoinsVal').textContent=G.save.coins;
  list.innerHTML=UPGRADES_DATA.map(u=>{
    const lv=getUpgLevel(u.id), max=u.costs.length;
    const isMax=lv>=max;
    const nextCost=isMax?0:u.costs[lv];
    const dots=Array.from({length:max},(_,i)=>`<div class="lvl-dot${i<lv?' filled':''}"></div>`).join('');
    return `<div class="upgrade-item" data-id="${u.id}">
      <div class="upgrade-icon-wrap">${u.icon}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${u.name}</div>
        <div class="upgrade-desc">${u.desc} — <span style="color:#FFD700">${u.levels[lv]}</span></div>
        <div class="upgrade-level">${dots}</div>
      </div>
      <div class="upgrade-cost">
        ${isMax?'<span class="max-lbl">MAX</span>':'<span class="cost-val">🪙'+nextCost+'</span>'}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.upgrade-item').forEach(el=>{
    el.addEventListener('click',()=>buyUpgrade(el.dataset.id));
  });
}

function buyUpgrade(id){
  const u=UPGRADES_DATA.find(x=>x.id===id);
  const lv=getUpgLevel(id), max=u.costs.length;
  if(lv>=max){ showNotif('✅ Already maxed!'); return; }
  const cost=u.costs[lv];
  if(G.save.coins<cost){ showNotif('❌ Need 🪙'+cost); return; }
  G.save.coins-=cost;
  G.save.upgrades[id]=(G.save.upgrades[id]||0)+1;
  save(); renderUpgrades();
  showNotif('⬆️ '+u.name+' upgraded!'); playSound('buy');
  updateHomeStats();
}

// ============================================================
// DAILY REWARD
// ============================================================
const DAILY_REWARDS=[100,150,200,300,500,750,1000];
const DAILY_ICONS=['🪙','🪙','💎','🪙','💎','🎁','👑'];
function checkDaily(){
  const now=Date.now(), last=G.save.lastDaily||0;
  const diff=now-last;
  const hasNew=diff>86400000;
  document.getElementById('dailyBadge').style.display=hasNew?'':'none';
  return hasNew;
}
function renderDaily(){
  const streak=G.save.streak%7;
  const canClaim=checkDaily();
  const reward=DAILY_REWARDS[streak];
  const icon=DAILY_ICONS[streak];
  document.getElementById('dailyRewardIcon').textContent=icon;
  document.getElementById('dailyRewardAmt').textContent='+'+reward+(icon==='💎'?' Gems':' Coins');
  const row=document.getElementById('streakRow');
  row.innerHTML=DAILY_REWARDS.map((_,i)=>`<div class="streak-day${i<streak?' claimed':i===streak?' today':''}">${DAILY_ICONS[i]}</div>`).join('');
  const btn=document.getElementById('claimBtn');
  btn.disabled=!canClaim;
  btn.textContent=canClaim?'🎁 CLAIM!':'✓ Come back tomorrow!';
  btn.style.opacity=canClaim?1:0.5;
}
document.getElementById('claimBtn').addEventListener('click',()=>{
  if(!checkDaily()) return;
  const streak=G.save.streak%7;
  const reward=DAILY_REWARDS[streak];
  const icon=DAILY_ICONS[streak];
  if(icon==='💎') G.save.gems+=reward; else G.save.coins+=reward;
  G.save.streak=(G.save.streak||0)+1;
  G.save.lastDaily=Date.now();
  save();
  playSound('buy');
  showNotif('🎁 Claimed '+reward+(icon==='💎'?' 💎':'🪙')+'!');
  renderDaily(); updateHomeStats();
  document.getElementById('dailyBadge').style.display='none';
});

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  G.gameState=id==='homeScreen'?'home':G.gameState;
}
function hideAllScreens(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
}

  const c=document.getElementById('starsEl');
  for(let i=0;i<60;i++){

    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;--d:${1+Math.random()*3}s;animation-delay:${Math.random()*3}s`;

}

(function drawHomeCanvas(){

})();
